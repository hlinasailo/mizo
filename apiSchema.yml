openapi: 3.0.3
info:
  title: Mizomade API
  version: 1.0.0
  description: "\n    API documentation for Mizomade backend services.\n    \n   \
    \ ## Authentication\n    This API uses JWT (JSON Web Token) authentication. To\
    \ authenticate:\n    \n    1. **Get Access Token**: POST `/api/v1/token/` with\
    \ username and password\n    2. **Use Token**: Include `Authorization: Bearer\
    \ <your_token>` in request headers\n    3. **Refresh Token**: POST `/api/v1/token/refresh/`\
    \ with refresh token when access token expires\n    \n    ## Token Lifetime\n\
    \    - Access Token: 60 minutes\n    - Refresh Token: 1 day\n    "
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Check the credentials and return the REST Token
        if the credentials are valid and authenticated.
        Calls Django Auth login method to register User ID
        in Django session framework

        Accept the following POST parameters: username, password
        Return the REST Framework Token Object's key.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - Bearer: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWT'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Calls Django logout method and delete the Token object
        assigned to the current User object.

        Accepts/Returns nothing.
      tags:
      - auth
      security:
      - jwtAuth: []
      - Bearer: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: |-
        Calls Django Auth SetPasswordForm save method.

        Accepts the following POST parameters: new_password1, new_password2
        Returns the success/fail message.
