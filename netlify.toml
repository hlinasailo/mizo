## Netlify configuration to ensure correct base, build, and publish paths
## Update the API_BASE_URL values in Netlify UI rather than committing secrets here.

[build]
  # path inside the repository where the frontend lives
  base = "mizomade_web_intern"
  # build command run inside the base directory
  command = "npm run generate"
  # publish directory relative to the base directory
  publish = ".output/public"
  # functions directory relative to the base directory (leave commented if unused)
  # functions = "netlify/functions"

[build.environment]
# Optional: pin Node version used during build
# NODE_VERSION = "18"

## Production environment placeholders (set real values in Netlify Site settings -> Environment)
[context.production.environment]
  # API_BASE_URL = "https://<your-render-backend>.onrender.com"
  # NUXT_PUBLIC_MEDIA_BASE_URL = "https://<your-render-backend>.onrender.com/media"
